<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zmate — Create Account</title>
<style>
  :root{
    --border-blue:#2B2DE8;
    --accent:#eeab7c;
    --accent-dark:#e2935c;
    --text-dark:#2b2b33;
    --text-muted:#8a8a94;
    --cream:#faf3e9;
    --card:#ffffff;
    --field-border:#e4e1e6;
    --header-h:64px;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    background:var(--cream);
    color:var(--text-dark);
    min-height:100vh;
  }

  /* ===== Header ===== */
  header.site-header{
    height:var(--header-h);
    background:var(--border-blue);
    display:flex;
    align-items:center;
    padding:0 20px;
    position:sticky;
    top:0;
    z-index:50;
  }

  header.site-header .logo-wrap{
    display:flex;
    align-items:center;
    height:100%;
  }

  header.site-header .logo-wrap img{
    height:75px;
    width:auto;
    display:block;
    object-fit:contain;
  }

  @media (max-width:480px){
    header.site-header{ padding:0 14px; }
    header.site-header .logo-wrap img{ height:56px; }
  }

  /* ===== Page ===== */
  .page-title{
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
    margin:28px 0 20px;
    letter-spacing:.2px;
  }

  .card-outer{
    max-width:420px;
    margin:0 auto 60px;
    padding:0 16px;
  }

  .card{
    background:var(--card);
    border-radius:16px;
    box-shadow:0 10px 30px rgba(43,45,232,0.06), 0 2px 8px rgba(0,0,0,0.04);
    padding:26px 22px 26px;
  }

  .heading{
    text-align:center;
    margin-bottom:20px;
  }

  .heading h1{
    font-size:21px;
    margin:0 0 4px;
    font-weight:700;
  }

  .heading p{
    margin:0;
    font-size:13px;
    color:var(--text-muted);
  }

  .field{
    margin-bottom:14px;
  }

  .field label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin-bottom:6px;
    color:var(--text-dark);
  }

  .field label .req{
    color:#e2593c;
    margin-left:2px;
  }

  .input-wrap{
    display:flex;
    align-items:center;
    border:1px solid var(--field-border);
    border-radius:8px;
    padding:0 12px;
    background:#fff;
    transition:border-color .15s ease, box-shadow .15s ease;
  }

  .input-wrap:focus-within{
    border-color:var(--accent-dark);
    box-shadow:0 0 0 3px rgba(238,171,124,0.25);
  }

  .input-wrap .icon{
    color:#a6a4ac;
    display:flex;
    align-items:center;
    flex-shrink:0;
  }

  .input-wrap .icon svg{ width:16px; height:16px; }

  .input-wrap input{
    flex:1;
    border:none;
    outline:none;
    padding:11px 10px;
    font-size:14px;
    background:transparent;
    color:var(--text-dark);
    min-width:0;
  }

  .input-wrap input::placeholder{ color:#b7b5bd; }

  .input-wrap .eye-btn{
    background:none;
    border:none;
    cursor:pointer;
    color:#a6a4ac;
    display:flex;
    align-items:center;
    padding:4px;
  }

  .agree-row{
    display:flex;
    align-items:flex-start;
    gap:9px;
    background:#f7f6f9;
    border-radius:8px;
    padding:12px;
    margin-bottom:18px;
    font-size:13px;
    color:var(--text-dark);
  }

  .agree-row input[type="checkbox"]{
    margin-top:2px;
    width:15px;
    height:15px;
    accent-color:var(--accent-dark);
    flex-shrink:0;
  }

  .agree-row a{
    color:var(--accent-dark);
    text-decoration:none;
    font-weight:600;
  }

  .agree-row a:hover{ text-decoration:underline; }

  .submit-btn{
    width:100%;
    padding:13px;
    background:#f5a500;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:background .2s ease, transform .1s ease;
  }

  .submit-btn:hover{ background:var(--accent-dark); }
  .submit-btn:active{ transform:scale(0.99); }
  .submit-btn:disabled{ background:#f0c8a9; cursor:not-allowed; }

  .signin-row{
    text-align:center;
    font-size:13.5px;
    color:var(--text-dark);
    margin-top:16px;
  }

  .signin-row a{
    color:var(--accent-dark);
    font-weight:700;
    text-decoration:none;
  }

  .signin-row a:hover{ text-decoration:underline; }

  /* ===== Status / error messages ===== */
  .form-msg{
    font-size:13px;
    text-align:center;
    margin:2px 0 14px;
    display:none;
    border-radius:8px;
    padding:9px 10px;
  }

  .form-msg.show{ display:block; }

  .form-msg.error{
    background:#fdeceb;
    color:#c8402c;
  }

  .form-msg.success{
    background:#eaf7ee;
    color:#22884a;
  }

  @media (max-width:380px){
    .card{ padding:20px 16px 24px; }
    .heading h1{ font-size:19px; }
  }
</style>
</head>

<p class="page-title">Create your account</p>

<div class="card-outer">
  <div class="card">

    <div class="heading">
      <h1>Create Account</h1>
      <p>Sign up with your email</p>
    </div>

    <div class="field">
      <label>Full Name <span class="req">*</span></label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
        </span>
        <input type="text" id="emailFullName" placeholder="Enter your full name">
      </div>
    </div>

    <div class="field">
      <label>Date of Birth <span class="req">*</span></label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </span>
        <input type="date" id="emailDob" placeholder="dd-mm-yyyy">
      </div>
    </div>

    <div class="field">
      <label>Email Address <span class="req">*</span></label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6c0-1.1-.9-2-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h16a2 2 0 0 0 2-2V6zm-2 0-8 5-8-5"/></svg>
        </span>
        <input type="email" id="emailAddress" placeholder="your.email@example.com">
      </div>
    </div>

    <div class="field">
      <label>Password <span class="req">*</span></label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="pw1" placeholder="Create password (min 6 chars)">
        <button type="button" class="eye-btn" data-target="pw1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Confirm Password <span class="req">*</span></label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="pw2" placeholder="Confirm your password">
        <button type="button" class="eye-btn" data-target="pw2">

<!-- ===== Firebase Authentication (Email/Password) ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBrXccirfZbk_kiQcNkbiUhxKKuWxkdI9c",
    authDomain: "zmate-affa0.firebaseapp.com",
    projectId: "zmate-affa0",
    storageBucket: "zmate-affa0.firebasestorage.app",
    messagingSenderId: "976248999877",
    appId: "1:976248999877:web:2ea572e6bbbfd2cd0b05ac",
    measurementId: "G-E25ZZLHWR9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  /* ---------- helpers ---------- */
  function showMsg(el, text, type){
    el.textContent = text;
    el.classList.remove('error', 'success');
    el.classList.add('show', type);
  }
  function hideMsg(el){
    el.classList.remove('show', 'error', 'success');
    el.textContent = '';
  }
  function setLoading(btn, loading, loadingText, normalText){
    btn.disabled = loading;
    btn.textContent = loading ? loadingText : normalText;
  }
  function friendlyError(err){
    const code = err && err.code ? err.code : '';
    const map = {
      'auth/invalid-email': 'That email address looks invalid.',
      'auth/email-already-in-use': 'An account with this email already exists.',
      'auth/weak-password': 'Password should be at least 6 characters.',
      'auth/network-request-failed': 'Network error. Check your connection and try again.'
    };
    return map[code] || (err && err.message ? err.message : 'Something went wrong. Please try again.');
  }

  const emailMsg = document.getElementById('emailMsg');
  const createAccountBtn = document.getElementById('createAccountBtn');

  async function createEmailAccount(){
    hideMsg(emailMsg);

    const fullName = document.getElementById('emailFullName').value.trim();
    const dob = document.getElementById('emailDob').value;
    const email = document.getElementById('emailAddress').value.trim();
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const agreed = document.getElementById('emailAgree').checked;

    if(!fullName){ showMsg(emailMsg, 'Please enter your full name.', 'error'); return; }
    if(!dob){ showMsg(emailMsg, 'Please enter your date of birth.', 'error'); return; }
    if(!email){ showMsg(emailMsg, 'Please enter your email address.', 'error'); return; }
    if(pw1.length < 6){ showMsg(emailMsg, 'Password must be at least 6 characters.', 'error'); return; }
    if(pw1 !== pw2){ showMsg(emailMsg, 'Passwords do not match.', 'error'); return; }
    if(!agreed){ showMsg(emailMsg, 'Please agree to the Terms and Privacy Policy.', 'error'); return; }

    setLoading(createAccountBtn, true, 'Creating account...', 'Create Account');
    try{
      const cred = await createUserWithEmailAndPassword(auth, email, pw1);
      try{ await updateProfile(cred.user, { displayName: fullName }); } catch(e){}
      showMsg(emailMsg, 'Account created successfully! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'signin.html'; }, 1200);
    } catch(err){
      showMsg(emailMsg, friendlyError(err), 'error');
    } finally {
      setLoading(createAccountBtn, false, 'Creating account...', 'Create Account');
    }
  }

  createAccountBtn.addEventListener('click', createEmailAccount);
</script>
